name: D1 Migrations Check

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  check-d1-migrations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate frontend build
        run: pnpm build

      - name: Validate D1 migration files are parseable
        run: pnpm dlx wrangler d1 migrations list too-much-to-do --local --config worker/wrangler.toml
